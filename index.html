<!DOCTYPE html>
<html lang="en">
            <meta charset="UTF-8"> 
            <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
            <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
            <link rel="manifest" href="manifest.json" />
            <link rel="manifest" href="app.webmanifest" crossorigin="use-credentials" />
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">  
            <meta name="apple-mobile-web-app-status-bar-style" content="black"> 
            <title>Weather Application</title>  
            <link rel="icon" type="image/x-icon" href="logo.png"> 
    <link rel="apple-touch-icon" href="logo.png"> 
    <link rel="apple-touch-icon" sizes="60x60" href="logo.png"> 
    <link rel="apple-touch-icon" sizes="114x114" href="logo.png"> 
    <link rel="apple-touch-icon" sizes="144x144" href="logo.png"> 
            <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"> 
           <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center min-vh-100">
    <div class="card col-11 col-md-8 ">
         <div class="card-body text-center mt-3">
            <h2 class="mb-4">
                <i class="bi bi-geo-alt text-danger"></i> Cookeville, TN
            </h2>
            <div class="mb-3">
                <p class="fs-3">
                     <i id="txtconditionIcon" class="bi bi-cloud-fill text-primary"></i>
                     <p id="txtWeatherConditions">Curent Weather Conditions</p>
                </p>
            </div>
            <div class=" mb-2">
                <p class="fs-3">
                    <i id="txtTempIcon" class="bi bi-thermometer-half text-danger"></i>
                     <label  id="txtTemp">--</label>
                </p>
                
            </div
           
             <div class="border-top pt-4">
                 <div class="col-12">
                     <p class="fs-3"> <!--fs=font size-->
                          <i class="bi bi-droplet-fill text-info"></i> 
                            Humity: <label id="txtHumity">--</label>%
                     </p>
                 </div>
            </div>

   
                <footer class="mt-2 justify-content-center text-center">
                    Data provided by <a href="https://open-meteo.com/"> open-meteo.com</a>
                 </footer>
          </div>
      </div>

</body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>

</body>
</html>
