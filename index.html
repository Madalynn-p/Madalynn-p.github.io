<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Weather Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="css/lib/bootstrap.min.css"rel="stylesheet"
</head>
<body class="bg-dark d-flex justify-content-center align-items-center min-vh-100">
    <div class="card col-11 col-md-8 ">
         <div class="card-body text-center mt-3">
            <h2 class="mb-4">
                <i class="bi bi-geo-alt"></i> Cookeville, TN
            </h2>
            <div class="mb-3">
                <i id="txtCondition" class="bi bi-cloud-fill text-primary"></i>
                <p id="txtWeatherConditions">Curent Weather Conditions</p>
            </div>
            <div class=" mb-2">
                <i class="bi bi-thermometer-half text-danger"></i>
                <span id="txtTemp">--</span>°F
            </div
           
             <div class="border-top pt-4">
                 <div class="col-12">
                     <p class="fs-5"> <!--fs=font size-->
                          <i class="bi bi-droplet-fill text-info"></i> 
                             Humidity: <span id="txtHumidity">--</span>%
                     </p>
                 </div>
            </div>

   
                <footer class="mt-2 justify-content-center text-center">
                    Data provided by <a href="https://open-meteo.com/"> open-meteo.com</a>
                 </footer>
          </div>
      </div>

</body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="main/app.js"></script>

</body>
</html>
